version: "3.3"

services:
  node:
    container_name: fenzo
    restart: always
    image: node:20.10.0
    ports:
      - 4001:3001
    volumes:
      - ./:/usr/src/fenzo
    working_dir: /usr/src/fenzo

    networks:
      - fenzo-network

    command: bash -c "npm install && npm run build && npm run start:prod"

networks:
  fenzo-network:
    driver: bridge